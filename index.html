<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#1a1a2e,#0f0f1a);
display:flex;
justify-content:center;
align-items:center;
perspective:1500px;
}

/* Fireworks Background */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

.container{
transform-style:preserve-3d;
animation:rotateCard 8s infinite alternate ease-in-out;
}

.card{
width:380px;
padding:30px;
text-align:center;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
box-shadow:
0 0 30px rgba(255,255,255,.2),
0 0 60px rgba(255,105,180,.3);
color:white;
}

.photo{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #fff;
object-fit:cover;
box-shadow:0 0 40px hotpink;
}

h1{
margin-top:20px;
font-size:2.7rem;
color:#ffd700;
text-shadow:0 0 20px gold;
}

.name{
font-size:1.8rem;
color:#ff77ff;
margin:15px 0;
}

.message{
line-height:1.8;
font-size:1rem;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff1493,#ff8c00);
color:white;
font-size:1rem;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.1);
}

@keyframes rotateCard{
0%{transform:rotateY(-10deg) rotateX(5deg);}
100%{transform:rotateY(10deg) rotateX(-5deg);}
}

/* Confetti */
.confetti{
position:fixed;
width:12px;
height:12px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<audio id="music" autoplay loop>
<source src="birthday-music.mp3" type="audio/mp3">
</audio>

<div class="container">
<div class="card">
<img src="photo.jpg" class="photo">

<h1>🎂 Happy Birthday 🎉</h1>

<div class="name">YOUR_NAME_HERE</div>

<p class="message">
Wishing you endless happiness,
success, love, and unforgettable memories.
May your special day be filled with joy,
laughter, and magical moments.
</p>

<button onclick="celebrate()">
🎁 Celebrate
</button>
</div>
</div>

<script>
// Confetti
function createConfetti(){
const colors=[
"#ff0","#0ff","#f0f",
"#ff4081","#00ff88","#ffffff"
 ];

for(let i=0;i<150;i++){
let c=document.createElement("div");
c.classList.add("confetti");

c.style.left=Math.random()*100+"vw";
c.style.background=
colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=
(3+Math.random()*4)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},7000);
}
}

function celebrate(){
createConfetti();

alert("🎂 Happy Birthday! 🎉");
}

// Fireworks
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function Firework(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){
particles.push({
x:this.x,
y:this.y,
dx:(Math.random()-0.5)*6,
dy:(Math.random()-0.5)*6,
life:100,
color:hsl(${Math.random()*360},100%,50%)
});
}
}

setInterval(()=>{
new Firework();
},1000);

function animate(){
requestAnimationFrame(animate);

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;

ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();

if(p.life<=0)
particles.splice(index,1);
});
}

animate();

// Auto confetti
setTimeout(createConfetti,1000);
</script>

</body>
</html>
